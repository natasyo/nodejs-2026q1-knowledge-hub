networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build: .
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/ || exit 1"]
    networks:
      - app-network

  adminer:
    image: adminer
    profiles: ["debug"]
    ports:
      - "8080:8080"
    networks:
      - app-network